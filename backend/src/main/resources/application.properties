# ===============================
# APPLICATION CONFIG
# ===============================
spring.application.name=ecommerce-backend

# Railway dynamic port
server.port=${PORT:8080}

# ===============================
# DATABASE CONFIG (Railway MySQL)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:ecommerce_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# FLYWAY (DISABLED FOR NOW)
# ===============================
spring.flyway.enabled=false

# ===============================
# EMAIL CONFIG (SECURE - ENV ONLY)
# ===============================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:manasaambati244@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:awmlfjwgckelsqzb}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Timeouts (optional but useful on Railway)
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Disable email check at startup
spring.mail.test-connection=false

# ===============================
# JWT CONFIG (USE ENV VARIABLE)
# ===============================
jwt.secret=${JWT_SECRET:my-local-development-jwt-secret-key-for-testing-12345}
jwt.expiration=86400000

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# CORS CONFIG
# ===============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.ecommerce=INFO

# ===============================
# PERFORMANCE OPTIMIZATION
# ===============================
# GZIP Compression
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,image/svg+xml

# Tomcat tuning
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=8192
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000
server.tomcat.keep-alive-timeout=60000

# Static resource caching (disabled for dev)
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.chain.enabled=true
