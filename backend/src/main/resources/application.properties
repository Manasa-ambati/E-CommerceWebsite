# Application Configuration
spring.application.name=ecommerce-backend

# Server Port (Railway uses dynamic port)
server.port=${PORT:8080}

# MySQL Database Configuration (Railway Environment Variables)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:ecommerce_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:mysqlroot}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Logging Configuration - Suppress Spring Boot startup warnings
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR
logging.level.org.springframework.web=INFO

# Email Configuration - ENABLED FOR ALL EMAILS
# IMPORTANT: This is your Gmail App Password (NOT regular password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=manasaambati244@gmail.com
spring.mail.password=dyofqxocwcgzpcwk
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Test email connection on startup (set to 'false' in production)
spring.mail.test-connection=false

# JWT Configuration
jwt.secret=your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters-long
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS - Allow all origins in production (Railway)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
