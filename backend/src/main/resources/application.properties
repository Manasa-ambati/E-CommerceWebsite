# Application Configuration
spring.application.name=ecommerce-backend

# Server Port (Railway uses dynamic port)
server.port=${PORT:8080}

# MySQL Database Configuration (Railway Environment Variables)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:ecommerce_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:mysqlroot}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Logging Configuration - Suppress Spring Boot startup warnings
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR
logging.level.org.springframework.web=INFO

# Email Configuration - ENABLED FOR ALL EMAILS
# IMPORTANT: Use Railway Environment Variables for sensitive data!
# If these variables are not set, email sending will fail gracefully at runtime (not on startup)
# SECURITY WARNING: Never commit actual passwords to version control!
# Use Railway environment variables for production credentials
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=manasaambati244@gmail.com
spring.mail.password=jquuoblzfirduagv
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# Increased timeouts for Railway network issues
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# Disable email test connection on startup (prevents crashes during deployment)
# Email connection is tested only when actually sending an email
spring.mail.test-connection=false

# JWT Configuration
jwt.secret=your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters-long
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS - Allow all origins in production (Railway)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ===================================
# PERFORMANCE OPTIMIZATION
# ===================================

# Enable Gzip Compression
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,image/svg+xml

# HTTP/2 Support (if using embedded Tomcat with SSL)
server.http2.enabled=true

# Tomcat Performance Tuning
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=8192
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000
server.tomcat.keep-alive-timeout=60000

# Static Resource Caching
spring.web.resources.cache.period=31536000
spring.web.resources.cache.cachecontrol.max-age=31536000
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.chain.enabled=true
spring.web.resources.chain.html-application-cache=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.fixed.enabled=true
