# Nixpacks Configuration for Backend ONLY
# This builds only the Spring Boot backend

[phases.setup]
nixPkgs = ["jdk17", "maven"]

[phases.install]
cmds = [
  "cd backend && mvn dependency:go-offline -q"
]

[phases.build]
cmds = [
  "cd backend && mvn clean package -DskipTests -q"
]

[start]
cmd = "java -jar backend/target/*.jar"
