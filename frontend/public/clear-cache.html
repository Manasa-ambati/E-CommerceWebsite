<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Cache - E-Commerce</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .status {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .info-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            text-align: left;
        }
        
        .info-box h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .info-box ul {
            list-style: none;
            padding-left: 0;
        }
        
        .info-box li {
            padding: 8px 0;
            color: #555;
        }
        
        .info-box li:before {
            content: "✓ ";
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Clear Application Cache</h1>
        <p>This will clear all cached files and reload the application with fresh resources.</p>
        
        <button class="btn" onclick="clearCache()">Clear Cache & Reload</button>
        <button class="btn btn-secondary" onclick="window.location.href='/'">Go to Home</button>
        
        <div id="status" class="status"></div>
        
        <div class="info-box">
            <h3>What this does:</h3>
            <ul>
                <li>Clears all cached CSS files</li>
                <li>Clears all cached JavaScript files</li>
                <li>Clears cached HTML and images</li>
                <li>Reloads the page with fresh resources</li>
            </ul>
        </div>
    </div>
    
    <script>
        function clearCache() {
            const statusDiv = document.getElementById('status');
            
            // Clear service worker cache if it exists
            if ('caches' in window) {
                caches.keys().then(function(names) {
                    for (let name of names) caches.delete(name);
                });
            }
            
            // Add timestamp to force reload
            const timestamp = new Date().getTime();
            const currentUrl = window.location.origin + '?t=' + timestamp;
            
            // Clear localStorage (optional - keeps your login)
            // localStorage.clear();
            
            // Show success message
            statusDiv.textContent = 'Cache cleared! Reloading...';
            statusDiv.className = 'status success';
            statusDiv.style.display = 'block';
            
            // Force hard reload after a short delay
            setTimeout(() => {
                window.location.replace(currentUrl);
            }, 1000);
        }
        
        // Auto-clear cache when page loads (optional)
        // clearCache();
    </script>
</body>
</html>
