<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-section {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
        }
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
        }
        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1>🧪 Product API Testing Tool</h1>
    
    <div class="test-section">
        <h2>Configuration</h2>
        <label for="apiUrl">API URL:</label>
        <input type="text" id="apiUrl" value="http://localhost:8080/api" style="width: 300px;">
        <br><br>
        <label for="productId">Product ID:</label>
        <input type="number" id="productId" value="1">
        <button onclick="runAllTests()">Run All Tests</button>
    </div>

    <div class="test-section">
        <h2>Test 1: Get Product By ID</h2>
        <button onclick="testGetProductById()">Test Get Product</button>
        <pre id="getProductResult"></pre>
    </div>

    <div class="test-section">
        <h2>Test 2: Get All Products</h2>
        <button onclick="testGetAllProducts()">Test GetAll Products</button>
        <pre id="getAllProductsResult"></pre>
    </div>

    <div class="test-section">
        <h2>Test 3: CORS Check</h2>
        <button onclick="testCORS()">Test CORS</button>
        <pre id="corsResult"></pre>
    </div>

    <script>
        function getApiUrl() {
            return document.getElementById('apiUrl').value;
        }

        function getProductId() {
            return parseInt(document.getElementById('productId').value);
        }

        async function testGetProductById() {
            const resultEl = document.getElementById('getProductResult');
            const productId = getProductId();
            const apiUrl = getApiUrl();
            
            resultEl.textContent = 'Loading...';
            resultEl.className = '';
            
            try {
                console.log(`Fetching product ${productId} from ${apiUrl}/products/${productId}`);
                const response = await fetch(`${apiUrl}/products/${productId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultEl.textContent = JSON.stringify(data, null, 2);
                    resultEl.className = 'success';
                    console.log('Success:', data);
                } else {
                    resultEl.textContent = `Error ${response.status}: ${JSON.stringify(data, null, 2)}`;
                    resultEl.className = 'error';
                    console.error('Error:', data);
                }
            } catch (error) {
                resultEl.textContent = `Network Error: ${error.message}\n\nCheck console for details`;
                resultEl.className = 'error';
                console.error('Network error:', error);
            }
        }

        async function testGetAllProducts() {
            const resultEl = document.getElementById('getAllProductsResult');
            const apiUrl = getApiUrl();
            
            resultEl.textContent = 'Loading...';
            resultEl.className = '';
            
            try {
                const response = await fetch(`${apiUrl}/products?page=0&size=12`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultEl.textContent = JSON.stringify(data, null, 2);
                    resultEl.className = 'success';
                } else {
                    resultEl.textContent = `Error ${response.status}: ${JSON.stringify(data, null, 2)}`;
                    resultEl.className = 'error';
                }
            } catch (error) {
                resultEl.textContent = `Network Error: ${error.message}`;
                resultEl.className = 'error';
            }
        }

        async function testCORS() {
            const resultEl = document.getElementById('corsResult');
            const apiUrl = getApiUrl();
            
            resultEl.textContent = 'Testing...';
            resultEl.className = '';
            
            try {
                const response = await fetch(`${apiUrl}/products`, {
                    method: 'OPTIONS',
                    headers: {
                        'Access-Control-Request-Method': 'GET',
                        'Access-Control-Request-Headers': 'Content-Type, Authorization',
                        'Origin': window.location.origin
                    }
                });
                
                resultEl.textContent = `CORS Status: ${response.status}\nHeaders:\n${[...response.headers.entries()].map(h => `${h[0]}: ${h[1]}`).join('\n')}`;
                resultEl.className = response.status === 200 || response.status === 0 ? 'success' : 'error';
            } catch (error) {
                resultEl.textContent = `CORS Error: ${error.message}`;
                resultEl.className = 'error';
            }
        }

        async function runAllTests() {
            await testCORS();
            await new Promise(resolve => setTimeout(resolve, 500));
            await testGetAllProducts();
            await new Promise(resolve => setTimeout(resolve, 500));
            await testGetProductById();
        }

        // Run tests on page load
        window.addEventListener('load', () => {
            console.log('Page loaded. Ready to test.');
        });
    </script>
</body>
</html>
