# Nixpacks Configuration for E-Commerce App
# Backend Only - Spring Boot Java Application
# Updated: 2026-04-09

[phases.setup]
nixPkgs = ["jdk17", "maven"]

[phases.install]
cmds = [
  "cd backend && mvn dependency:go-offline -q"
]

[phases.build]
cmds = [
  "cd backend && mvn clean package -DskipTests -q"
]

[start]
cmd = "java -jar backend/target/*.jar"