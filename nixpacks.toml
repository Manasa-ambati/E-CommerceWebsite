[phases.setup]
nixPkgs = ["jdk17" "maven" "nodejs_20"]

[phases.install]
cmds = [
  "cd backend && mvn dependency:go-offline",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd backend && mvn clean package -DskipTests",
  "cd frontend && CI=false npm run build"
]

[start]
cmd = "java -jar backend/target/*.jar"