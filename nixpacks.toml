# Nixpacks configuration for serving both frontend and backend

[phases.setup]
nixPkgs = ["nodejs_20" "jdk17" "maven"]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "cd ../backend && mvn clean package -DskipTests"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "echo 'Build complete'"
]

[start]
cmd = "java -jar backend/target/ecommerce-backend-0.0.1-SNAPSHOT.jar"
